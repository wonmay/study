<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>权限提示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f5f7fa;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .tip {
            font-size: 22px;
            color: #666;
            padding: 20px 40px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.08);
        }
    </style>
</head>
<body>
    <div class="tip">权限不足，请联系管理员。</div>
</body>
</html>
